# ============================================================================
# Default configuration for Carolina × PoetaV2 overlap analysis
# Copy to configs/local.yaml and adjust paths for your environment.
# ============================================================================

paths:
  carolina_dir: null        # Path to Carolina corpus files (Parquet / JSONL)
  poetav2_dir: null          # Path to PoetaV2 benchmark task files
  output_dir: results/

extraction:
  # Which PoetaV2 tasks to include (null = all)
  tasks: null
  # Fields to extract from each evaluation instance
  fields: [question, context, answer, choices]
  # Minimum text length (chars) to consider for overlap
  min_length: 20

normalization:
  unicode: NFKC
  lowercase: true
  strip_whitespace: true
  strip_punctuation: false
  strip_accents: false       # Portuguese diacritics are semantically meaningful

# ---- Embedding-based semantic search (primary method) ----
embeddings:
  model: "BAAI/bge-m3"       # Best free multilingual embedding model
  batch_size: 64
  top_k: 5                   # Nearest neighbors per query
  threshold: 0.85            # Cosine similarity threshold for "overlap"
  index_cache: data/processed/faiss_index  # Cache built index here

# ---- N-gram overlap (complementary method) ----
indexing:
  ngram_sizes: [8, 13]

matching:
  exact: true
  near:
    enabled: true
    threshold: 0.70
    ngram_size: 8

scoring:
  confidence_threshold: 0.8
  bootstrap_n: 10000
  bootstrap_ci: 0.95

reporting:
  formats: [csv, latex, parquet]
  figure_dpi: 300
  figure_format: pdf
